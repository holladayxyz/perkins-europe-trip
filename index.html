// ============ APP ============
function parseHash() {
  const h = window.location.hash.replace(/^#\/?/,"");
  if (!h) return {routeId:null,tab:null,season:null};
  const parts = h.split("/");
  const routeId = parts[0]||null;
  const tab = parts[1]||null;
  const season = parts[2]||null;
  return {routeId,tab,season};
}
function setHash(routeId,tab,season) {
  const h = routeId ? "#/"+routeId+(tab?"/"+tab:"")+(season?"/"+season:"") : "";
  if (window.location.hash !== h) window.history.replaceState(null,"",h||window.location.pathname);
}

function App() {
  const init = parseHash();
  const initIdx = init.routeId ? ROUTES.findIndex(r=>r.id===init.routeId) : null;
  const [selectedRoute, setSelectedRoute] = useState(initIdx>=0?initIdx:null);
  const [initTab] = useState(init.tab);
  const [initSeason] = useState(init.season);

  useEffect(()=>{
    const onHash = ()=>{
      const p = parseHash();
      if (!p.routeId) { setSelectedRoute(null); return; }
      const idx = ROUTES.findIndex(r=>r.id===p.routeId);
      if (idx>=0) setSelectedRoute(idx);
      else setSelectedRoute(null);
    };
    window.addEventListener("hashchange",onHash);
    return ()=>window.removeEventListener("hashchange",onHash);
  },[]);

  useEffect(()=>{
    if (selectedRoute===null) setHash(null);
  },[selectedRoute]);

  if (selectedRoute !== null) {
    return React.createElement(DetailView, {
      route: ROUTES[selectedRoute],
      routeIndex: selectedRoute,
      onBack: () => { setSelectedRoute(null); setHash(null); },
      initTab: initTab,
      initSeason: initSeason,
    });
  }
  return React.createElement(OverviewScreen, { onSelect: (i)=>{ setSelectedRoute(i); setHash(ROUTES[i].id,"overview","fall"); } });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
